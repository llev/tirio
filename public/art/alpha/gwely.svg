    <path d="M56 96 v86"></path><path d="M56 130 h130 v28 q0 8 -8 8 h-114 q-8 0 -8 -8 Z"></path><path d="M70 134 h36 v18 h-36 Z"></path><path d="M108 140 h78"></path><path d="M178 116 v66"></path><path d="M64 166 v16 M182 166 v16"></path>
  </g>
</svg>