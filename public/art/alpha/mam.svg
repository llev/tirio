    <circle cx="100" cy="62" r="18"></circle><circle cx="94" cy="60" r="2.4" fill="#15130e"></circle><circle cx="106" cy="60" r="2.4" fill="#15130e"></circle><path d="M94 70 q6 5 12 0"></path><path d="M100 80 l-22 66 h44 Z"></path><path d="M90 146 v20 M110 146 v20"></path><path d="M120 118 q14 4 22 -2"></path><circle cx="150" cy="98" r="13"></circle><circle cx="146" cy="96" r="2.2" fill="#15130e"></circle><circle cx="154" cy="96" r="2.2" fill="#15130e"></circle><path d="M146 104 q4 4 8 0"></path><path d="M150 111 v32 M140 144 v22 M160 144 v22"></path>
