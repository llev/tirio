    <path d="M52 178 q4 -84 68 -84 q64 0 68 84 Z"></path><path d="M92 178 q0 -44 28 -44 q28 0 28 44 Z" fill="#15130e"></path><path d="M70 150 q8 -6 6 -16 M168 150 q-8 -6 -6 -16" stroke-width="3"></path><path d="M48 178 h144"></path>
