<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240">
  <defs>
    <filter id="back" x="-45%" y="-45%" width="190%" height="190%">
      <feMorphology in="SourceAlpha" operator="dilate" radius="12" result="f"></feMorphology>
      <feTurbulence type="fractalNoise" baseFrequency="0.016" numOctaves="2" seed="600" result="n"></feTurbulence>
      <feDisplacementMap in="f" in2="n" scale="7" xChannelSelector="R" yChannelSelector="G" result="rr"></feDisplacementMap>
      <feFlood flood-color="#f1c43e" result="c"></feFlood>
      <feComposite in="c" in2="rr" operator="in"></feComposite>
    </filter>
    <filter id="ln" x="-30%" y="-30%" width="160%" height="160%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="1000" result="n"></feTurbulence>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="4.2" xChannelSelector="R" yChannelSelector="G"></feDisplacementMap>
    </filter>
  </defs>
  <g filter="url(#back)" transform="translate(6 7) rotate(-3 120 120)">
    <rect x="56" y="96" width="96" height="56"></rect><path d="M152 116 h26 l12 22 0 14 -38 0 Z"></path><circle cx="86" cy="160" r="14"></circle><circle cx="166" cy="160" r="14"></circle>
  </g>
  <g filter="url(#ln)" transform="rotate(-3 120 120)" fill="none" stroke="#15130e" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <rect x="56" y="96" width="96" height="56"></rect><path d="M152 116 h26 l12 22 0 14 -38 0 Z"></path><path d="M156 120 h16 v14 h-16 Z" stroke-width="3.4"></path><circle cx="86" cy="160" r="14"></circle><circle cx="166" cy="160" r="14"></circle><circle cx="86" cy="160" r="4" fill="#15130e"></circle><circle cx="166" cy="160" r="4" fill="#15130e"></circle><path d="M50 174 h140"></path>
  </g>
</svg>