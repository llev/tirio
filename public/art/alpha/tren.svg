    <rect x="58" y="116" width="120" height="46" rx="6"></rect><rect x="58" y="86" width="46" height="38" rx="4"></rect><path d="M68 96 h26 v18 h-26 Z" stroke-width="3.4"></path><rect x="150" y="92" width="20" height="26"></rect><circle cx="160" cy="78" r="9"></circle><circle cx="84" cy="168" r="14"></circle><circle cx="130" cy="168" r="14"></circle><circle cx="166" cy="168" r="10"></circle><path d="M112 130 h54" stroke-width="3.4"></path>
  </g>
