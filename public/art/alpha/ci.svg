<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240">
  <defs>
    <filter id="back" x="-45%" y="-45%" width="190%" height="190%">
      <feMorphology in="SourceAlpha" operator="dilate" radius="12" result="f"></feMorphology>
      <feTurbulence type="fractalNoise" baseFrequency="0.016" numOctaves="2" seed="81" result="n"></feTurbulence>
      <feDisplacementMap in="f" in2="n" scale="7" xChannelSelector="R" yChannelSelector="G" result="rr"></feDisplacementMap>
      <feFlood flood-color="#f1c43e" result="c"></feFlood>
      <feComposite in="c" in2="rr" operator="in"></feComposite>
    </filter>
    <filter id="ln" x="-30%" y="-30%" width="160%" height="160%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="82" result="n"></feTurbulence>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="4.2" xChannelSelector="R" yChannelSelector="G"></feDisplacementMap>
    </filter>
  </defs>
  <g filter="url(#back)" transform="translate(6 7) rotate(4 120 120)">
    <circle cx="120" cy="98" r="34"></circle><path d="M90 76 q-24 -4 -24 28 q0 18 18 16 Z"></path><path d="M150 76 q24 -4 24 28 q0 18 -18 16 Z"></path><path d="M84 150 q-6 46 36 46 q42 0 36 -46 Z"></path>
  </g>
  <g filter="url(#ln)" transform="rotate(4 120 120)" fill="none" stroke="#15130e" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="120" cy="98" r="34"></circle><path d="M90 76 q-24 -4 -24 28 q0 18 18 16"></path><path d="M150 76 q24 -4 24 28 q0 18 -18 16"></path><circle cx="106" cy="94" r="3.4" fill="#15130e"></circle><circle cx="134" cy="94" r="3.4" fill="#15130e"></circle><ellipse cx="120" cy="110" rx="7" ry="5" fill="#15130e"></ellipse><path d="M120 115 q-8 8 -16 4 M120 115 q8 8 16 4"></path><path d="M84 150 q-6 46 36 46 q42 0 36 -46"></path><path d="M150 168 q26 4 22 -24"></path>
  </g>
</svg>