    <path d="M74 110 h92 v72 h-92 Z"></path><path d="M64 112 l56 -46 56 46 Z"></path><path d="M142 80 v18"></path><path d="M100 182 v-38 h26 v38"></path><path d="M134 128 h22 v22 h-22 Z"></path><path d="M145 128 v22 M134 139 h22" stroke-width="2.6"></path>
