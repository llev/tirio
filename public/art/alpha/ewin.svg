  </g>
  <g filter="url(#ln)" transform="rotate(-5 120 120)" fill="none" stroke="#15130e" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M94 186 q-8 -74 26 -100 q34 26 26 100 Z"></path><path d="M104 98 q16 -14 32 0 q4 24 -16 26 q-20 -2 -16 -26 Z"></path><path d="M100 144 q20 8 40 0 M100 164 q20 8 40 0" stroke-width="3.4"></path>
  </g>
</svg>