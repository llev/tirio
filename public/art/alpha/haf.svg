<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240">
  <defs>
    <filter id="back" x="-45%" y="-45%" width="190%" height="190%">
      <feMorphology in="SourceAlpha" operator="dilate" radius="12" result="f"></feMorphology>
      <feTurbulence type="fractalNoise" baseFrequency="0.016" numOctaves="2" seed="314" result="n"></feTurbulence>
      <feDisplacementMap in="f" in2="n" scale="7" xChannelSelector="R" yChannelSelector="G" result="rr"></feDisplacementMap>
      <feFlood flood-color="#f1c43e" result="c"></feFlood>
      <feComposite in="c" in2="rr" operator="in"></feComposite>
    </filter>
    <filter id="ln" x="-30%" y="-30%" width="160%" height="160%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="714" result="n"></feTurbulence>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="4.2" xChannelSelector="R" yChannelSelector="G"></feDisplacementMap>
    </filter>
  </defs>
  <g filter="url(#back)" transform="translate(6 7) rotate(-4 120 120)">
    <circle cx="120" cy="112" r="40"></circle><path d="M120 52 v-12 M64 112 h-12 M176 112 h12 M80 72 l-9 -9 M160 72 l9 -9 M80 152 l-9 9 M160 152 l9 9" fill="none" stroke="#000" stroke-width="11" stroke-linecap="round"></path>
  </g>
  <g filter="url(#ln)" transform="rotate(-4 120 120)" fill="none" stroke="#15130e" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="120" cy="112" r="40"></circle><path d="M120 52 v-12 M64 112 h-12 M176 112 h12 M80 72 l-9 -9 M160 72 l9 -9 M80 152 l-9 9 M160 152 l9 9"></path><path d="M96 102 h22 v14 q0 4 -4 4 h-14 q-4 0 -4 -4 Z" fill="#15130e"></path><path d="M122 102 h22 v14 q0 4 -4 4 h-14 q-4 0 -4 -4 Z" fill="#15130e"></path><path d="M118 105 h4" stroke="#15130e" stroke-width="3"></path>
  </g>
</svg>