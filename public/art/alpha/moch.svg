<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240">
  <defs>
    <filter id="back" x="-45%" y="-45%" width="190%" height="190%">
      <feMorphology in="SourceAlpha" operator="dilate" radius="12" result="f"></feMorphology>
      <feTurbulence type="fractalNoise" baseFrequency="0.016" numOctaves="2" seed="608" result="n"></feTurbulence>
      <feDisplacementMap in="f" in2="n" scale="7" xChannelSelector="R" yChannelSelector="G" result="rr"></feDisplacementMap>
      <feFlood flood-color="#46c07a" result="c"></feFlood>
      <feComposite in="c" in2="rr" operator="in"></feComposite>
    </filter>
    <filter id="ln" x="-30%" y="-30%" width="160%" height="160%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="1008" result="n"></feTurbulence>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="4.2" xChannelSelector="R" yChannelSelector="G"></feDisplacementMap>
    </filter>
  </defs>
  <g filter="url(#back)" transform="translate(6 7) rotate(-3 120 120)">
    <ellipse cx="120" cy="130" rx="50" ry="42"></ellipse><path d="M86 96 l-6 -20 22 14 Z"></path><path d="M154 96 l6 -20 -22 14 Z"></path><ellipse cx="120" cy="138" rx="22" ry="16"></ellipse>
  </g>
  <g filter="url(#ln)" transform="rotate(-3 120 120)" fill="none" stroke="#15130e" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <ellipse cx="120" cy="130" rx="50" ry="42"></ellipse><path d="M86 96 l-6 -20 22 14 Z"></path><path d="M154 96 l6 -20 -22 14 Z"></path><circle cx="102" cy="112" r="3" fill="#15130e"></circle><circle cx="138" cy="112" r="3" fill="#15130e"></circle><ellipse cx="120" cy="138" rx="22" ry="16"></ellipse><circle cx="113" cy="138" r="3" fill="#15130e"></circle><circle cx="127" cy="138" r="3" fill="#15130e"></circle><path d="M168 120 q18 -2 16 -16 q-2 -10 -12 -6"></path><path d="M96 170 q-2 8 -10 10 M144 170 q2 8 10 10" stroke-width="4"></path>
  </g>
</svg>