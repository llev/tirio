    <path d="M56 160 q-2 -18 18 -22 q6 -32 30 -36 q12 28 42 32 q28 4 38 24 q4 18 -12 20 l-106 0 q-10 0 -8 -10 Z"></path><path d="M56 168 h116"></path><path d="M104 114 l20 10 M100 126 l24 10 M97 138 l26 10" stroke-width="4"></path>
