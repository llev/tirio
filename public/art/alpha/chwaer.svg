    <circle cx="98" cy="68" r="17"></circle><path d="M98 86 l-24 60 h48 Z"></path><path d="M88 146 v18 M108 146 v18" fill="none" stroke="#000" stroke-width="14" stroke-linecap="round"></path><circle cx="146" cy="82" r="15"></circle><path d="M146 99 l-20 50 h40 Z"></path><path d="M138 149 v16 M154 149 v16" fill="none" stroke="#000" stroke-width="13" stroke-linecap="round"></path>
  </g>
