    <path d="M120 80 C 106 58 74 56 63 92 C 54 120 62 168 94 186 C 107 193 114 187 120 178 C 126 187 133 193 146 186 C 178 168 186 120 177 92 C 166 56 134 58 120 80 Z"></path><path d="M118 66 q-4 -20 9 -32"></path><path d="M124 58 q26 -18 42 -2 q-12 22 -42 12 Z"></path><path d="M84 96 q10 -14 24 -12" stroke-width="4"></path>
