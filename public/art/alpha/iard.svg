    <path d="M72 84 v98"></path><path d="M64 96 h30"></path><path d="M86 96 q44 24 76 84 M100 110 q40 26 60 70"></path><path d="M76 116 h14 M76 138 h14 M76 160 h14" stroke-width="3.4"></path><path d="M52 186 h140"></path>
