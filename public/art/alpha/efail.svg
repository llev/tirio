    <path d="M56 110 h98 q16 0 16 9 q0 9 -18 9 l-70 0 q-14 0 -14 -9 q0 -9 16 -9 Z"></path><path d="M98 128 h44 l-8 22 h-28 Z"></path><path d="M76 150 h88 v16 h-88 Z"></path><path d="M168 84 l10 -8 M176 98 l12 -3" stroke-width="3"></path>
