    <rect x="70" y="96" width="100" height="84" rx="4"></rect><path d="M112 112 h16 v12 h12 v16 h-12 v12 h-16 v-12 h-12 v-16 h12 Z"></path><path d="M82 158 h16 v22 h-16 Z M142 158 h16 v22 h-16 Z" stroke-width="3.4"></path><path d="M70 110 h100" stroke-width="3.4"></path>
  </g>
