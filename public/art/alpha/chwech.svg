<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240">
  <defs>
    <filter id="back" x="-45%" y="-45%" width="190%" height="190%">
      <feMorphology in="SourceAlpha" operator="dilate" radius="12" result="f"></feMorphology>
      <feTurbulence type="fractalNoise" baseFrequency="0.016" numOctaves="2" seed="101" result="n"></feTurbulence>
      <feDisplacementMap in="f" in2="n" scale="7" xChannelSelector="R" yChannelSelector="G" result="rr"></feDisplacementMap>
      <feFlood flood-color="#9d7bef" result="c"></feFlood>
      <feComposite in="c" in2="rr" operator="in"></feComposite>
    </filter>
    <filter id="ln" x="-30%" y="-30%" width="160%" height="160%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="102" result="n"></feTurbulence>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="4.2" xChannelSelector="R" yChannelSelector="G"></feDisplacementMap>
    </filter>
  </defs>
  <g filter="url(#back)" transform="translate(6 7) rotate(-5 120 120)">
    <circle cx="118" cy="150" r="36"></circle><path d="M150 80 q-50 -6 -58 64" fill="none" stroke="#000" stroke-width="16" stroke-linecap="round"></path>
  </g>
  <g filter="url(#ln)" transform="rotate(-5 120 120)" fill="none" stroke="#15130e" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="118" cy="150" r="36"></circle><path d="M150 80 q-50 -6 -58 64"></path>
  </g>
</svg>