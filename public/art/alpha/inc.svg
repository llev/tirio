    <path d="M86 120 h68 v50 q0 8 -8 8 h-52 q-8 0 -8 -8 Z"></path><path d="M100 104 h40 v16 h-40 Z"></path><path d="M96 104 h48"></path><path d="M92 140 h56 v22 h-56 Z" stroke-width="3.4"></path><path d="M138 104 l28 -46 q6 -8 10 -2 q4 6 -2 12 l-30 44" stroke-width="4"></path>
  </g>
