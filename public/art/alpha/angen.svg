<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240">
  <defs>
    <filter id="back" x="-45%" y="-45%" width="190%" height="190%">
      <feMorphology in="SourceAlpha" operator="dilate" radius="12" result="f"></feMorphology>
      <feTurbulence type="fractalNoise" baseFrequency="0.016" numOctaves="2" seed="311" result="n"></feTurbulence>
      <feDisplacementMap in="f" in2="n" scale="7" xChannelSelector="R" yChannelSelector="G" result="rr"></feDisplacementMap>
      <feFlood flood-color="#ef5a44" result="c"></feFlood>
      <feComposite in="c" in2="rr" operator="in"></feComposite>
    </filter>
    <filter id="ln" x="-30%" y="-30%" width="160%" height="160%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="711" result="n"></feTurbulence>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="4.2" xChannelSelector="R" yChannelSelector="G"></feDisplacementMap>
    </filter>
  </defs>
  <g filter="url(#back)" transform="translate(6 7) rotate(-3 120 120)"><path d="M86 178 q-6 -44 14 -52 l40 0 q20 8 14 52 Z"></path><path d="M100 134 v-36 M114 130 v-48 M128 130 v-44 M142 134 v-32 M88 144 l-22 -10" fill="none" stroke="#000" stroke-width="14" stroke-linecap="round"></path></g>
  <g filter="url(#ln)" transform="rotate(-3 120 120)" fill="none" stroke="#15130e" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"><path d="M86 178 q-6 -44 14 -52 l40 0 q20 8 14 52 Z"></path><path d="M100 134 v-36 M114 130 v-48 M128 130 v-44 M142 134 v-32"></path><path d="M88 144 l-22 -10"></path><path d="M100 158 q20 6 40 -2" stroke-width="3.4"></path><path d="M58 150 l-12 -4 M56 166 l-13 0" stroke-width="3"></path></g>
</svg>