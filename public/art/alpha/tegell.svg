<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240">
  <defs>
    <filter id="back" x="-45%" y="-45%" width="190%" height="190%">
      <feMorphology in="SourceAlpha" operator="dilate" radius="12" result="f"></feMorphology>
      <feTurbulence type="fractalNoise" baseFrequency="0.016" numOctaves="2" seed="915" result="n"></feTurbulence>
      <feDisplacementMap in="f" in2="n" scale="7" xChannelSelector="R" yChannelSelector="G" result="rr"></feDisplacementMap>
      <feFlood flood-color="#3f86ee" result="c"></feFlood>
      <feComposite in="c" in2="rr" operator="in"></feComposite>
    </filter>
    <filter id="ln" x="-30%" y="-30%" width="160%" height="160%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="1315" result="n"></feTurbulence>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="4.2" xChannelSelector="R" yChannelSelector="G"></feDisplacementMap>
    </filter>
  </defs>
  <g filter="url(#back)" transform="translate(6 7) rotate(3 120 120)">
    <path d="M78 116 q0 -28 42 -28 q42 0 42 28 l-4 44 q-1 10 -12 10 h-52 q-11 0 -12 -10 Z"></path><path d="M96 90 q24 -28 48 0" fill="none" stroke="#000" stroke-width="12"></path><path d="M162 110 l24 -8 -2 14 -20 6 Z"></path><circle cx="120" cy="84" r="8"></circle>
  </g>
  <g filter="url(#ln)" transform="rotate(3 120 120)" fill="none" stroke="#15130e" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M78 116 q0 -28 42 -28 q42 0 42 28 l-4 44 q-1 10 -12 10 h-52 q-11 0 -12 -10 Z"></path><path d="M96 90 q24 -28 48 0"></path><path d="M162 110 l24 -8 -2 14 -20 6 Z"></path><path d="M84 104 q36 -10 72 0" stroke-width="3.4"></path><circle cx="120" cy="84" r="8"></circle>
  </g>
</svg>