  </g>
  <g filter="url(#ln)" transform="rotate(4 120 120)" fill="none" stroke="#15130e" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M76 88 h88 v96 h-88 Z"></path><path d="M76 120 h88 M76 152 h88 M105 88 v96 M135 88 v96"></path><path d="M76 88 l29 16 M105 88 l30 16 M135 88 l29 16" stroke-width="2.6"></path>
  </g>
</svg>