      <feDisplacementMap in="SourceGraphic" in2="n" scale="4.2" xChannelSelector="R" yChannelSelector="G"></feDisplacementMap>
    </filter>
  </defs>
  <g filter="url(#back)" transform="translate(6 7) rotate(4 120 120)">
    <path d="M82 156 q-2 -18 18 -20 q6 -2 30 6 q12 4 10 12 q-2 6 -10 6 l-42 0 q-6 0 -6 -4 Z"></path><path d="M132 156 q-2 -18 18 -20 q6 -2 22 4 q10 4 8 12 q-2 6 -10 6 l-40 0 q-6 0 -6 -2 Z"></path>
  </g>
