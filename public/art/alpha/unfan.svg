    <path d="M82 156 q-2 -18 18 -20 q6 -2 30 6 q12 4 10 12 q-2 6 -10 6 l-42 0 q-6 0 -6 -4 Z"></path><path d="M132 156 q-2 -18 18 -20 q6 -2 22 4 q10 4 8 12 q-2 6 -10 6 l-40 0 q-6 0 -6 -2 Z"></path><path d="M96 120 q24 -14 48 0" stroke-width="3.4"></path><path d="M74 174 l-10 6 M170 174 l10 6 M120 178 v8" stroke-width="3"></path>
  </g>
