<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240" role="img" aria-label="Tatws">
  <defs>
    <filter id="back" x="-45%" y="-45%" width="190%" height="190%">
      <feMorphology in="SourceAlpha" operator="dilate" radius="12" result="f"></feMorphology>
      <feTurbulence type="fractalNoise" baseFrequency="0.016" numOctaves="2" seed="75" result="n"></feTurbulence>
      <feDisplacementMap in="f" in2="n" scale="7" xChannelSelector="R" yChannelSelector="G" result="rr"></feDisplacementMap>
      <feFlood flood-color="#f1c43e" result="c"></feFlood>
      <feComposite in="c" in2="rr" operator="in"></feComposite>
    </filter>
    <filter id="ln" x="-30%" y="-30%" width="160%" height="160%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="76" result="n"></feTurbulence>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="4.2" xChannelSelector="R" yChannelSelector="G"></feDisplacementMap>
    </filter>
  </defs>
  <g filter="url(#back)" transform="translate(6 7) rotate(-3 120 120)">
    <path d="M68 150 q-9 -27 16 -38 q27 -11 40 8 q11 17 -7 31 q-23 19 -49 -1 Z"></path>
    <path d="M118 158 q-7 -23 18 -29 q23 -6 31 11 q6 17 -13 25 q-23 9 -36 -7 Z"></path>
  </g>
  <g filter="url(#ln)" transform="rotate(-3 120 120)" fill="none" stroke="#15130e" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M68 150 q-9 -27 16 -38 q27 -11 40 8 q11 17 -7 31 q-23 19 -49 -1 Z"></path>
      <path d="M118 158 q-7 -23 18 -29 q23 -6 31 11 q6 17 -13 25 q-23 9 -36 -7 Z"></path>
      <circle cx="92" cy="132" r="2.6" fill="#15130e"></circle>
      <circle cx="105" cy="143" r="2.1" fill="#15130e"></circle>
      <circle cx="143" cy="142" r="2.3" fill="#15130e"></circle>
      <path d="M86 124 q-3 -8 2 -13 M150 132 q3 -8 9 -8" stroke-width="2.6"></path>
  </g>
</svg>