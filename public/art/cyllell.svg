<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240" role="img" aria-label="Cyllell">
  <defs>
    <filter id="back" x="-45%" y="-45%" width="190%" height="190%">
      <feMorphology in="SourceAlpha" operator="dilate" radius="12" result="f"></feMorphology>
      <feTurbulence type="fractalNoise" baseFrequency="0.016" numOctaves="2" seed="53" result="n"></feTurbulence>
      <feDisplacementMap in="f" in2="n" scale="7" xChannelSelector="R" yChannelSelector="G" result="rr"></feDisplacementMap>
      <feFlood flood-color="#f1c43e" result="c"></feFlood>
      <feComposite in="c" in2="rr" operator="in"></feComposite>
    </filter>
    <filter id="ln" x="-30%" y="-30%" width="160%" height="160%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="54" result="n"></feTurbulence>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="4.2" xChannelSelector="R" yChannelSelector="G"></feDisplacementMap>
    </filter>
  </defs>
  <g filter="url(#back)" transform="translate(6 7) rotate(-5 120 120)">
    <path d="M108 58 L132 60 L134 140 L106 140 Z"></path>
    <path d="M106 138 L134 138 L131 184 L109 184 Z"></path>
  </g>
  <g filter="url(#ln)" transform="rotate(-5 120 120)" fill="none" stroke="#15130e" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M120 58 q11 1 12 18 l2 62 l-28 0 l2 -62 q1 -17 12 -18 Z"></path>
      <path d="M106 138 l28 0 l-3 42 q-1 6 -11 6 q-10 0 -11 -6 Z"></path>
      <path d="M120 72 q-4 28 -2 62" stroke-width="2.6"></path>
      <path d="M114 150 l12 0 M114 162 l12 0" stroke-width="2.4"></path>
  </g>
</svg>