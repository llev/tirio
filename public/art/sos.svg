<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240" role="img" aria-label="Sos">
  <defs>
    <filter id="back" x="-45%" y="-45%" width="190%" height="190%">
      <feMorphology in="SourceAlpha" operator="dilate" radius="12" result="f"></feMorphology>
      <feTurbulence type="fractalNoise" baseFrequency="0.016" numOctaves="2" seed="185" result="n"></feTurbulence>
      <feDisplacementMap in="f" in2="n" scale="7" xChannelSelector="R" yChannelSelector="G" result="rr"></feDisplacementMap>
      <feFlood flood-color="#ef5a44" result="c"></feFlood>
      <feComposite in="c" in2="rr" operator="in"></feComposite>
    </filter>
    <filter id="ln" x="-30%" y="-30%" width="160%" height="160%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="186" result="n"></feTurbulence>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="4.2" xChannelSelector="R" yChannelSelector="G"></feDisplacementMap>
    </filter>
  </defs>
  <g filter="url(#back)" transform="translate(6 7) rotate(-3 120 120)">
    <path d="M106 74 l28 0 l0 11 q12 6 12 22 l0 69 q0 10 -10 10 l-32 0 q-10 0 -10 -10 l0 -69 q0 -16 12 -22 Z"></path>
    <path d="M110 59 l20 0 l0 15 l-20 0 Z"></path>
  </g>
  <g filter="url(#ln)" transform="rotate(-3 120 120)" fill="none" stroke="#15130e" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M106 74 l28 0 l0 11 q12 6 12 22 l0 69 q0 10 -10 10 l-32 0 q-10 0 -10 -10 l0 -69 q0 -16 12 -22 Z"></path>
      <path d="M110 62 q0 -3 4 -3 l12 0 q4 0 4 3 l0 12 l-20 0 Z"></path>
      <path d="M104 120 q16 6 32 0 l0 30 q-16 6 -32 0 Z"></path>
      <path d="M120 90 q-1 4 0 8" stroke-width="2.4"></path>
  </g>
</svg>