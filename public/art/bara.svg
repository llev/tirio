<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240" role="img" aria-label="Bara">
  <defs>
    <filter id="back" x="-45%" y="-45%" width="190%" height="190%">
      <feMorphology in="SourceAlpha" operator="dilate" radius="12" result="f"></feMorphology>
      <feTurbulence type="fractalNoise" baseFrequency="0.016" numOctaves="2" seed="141" result="n"></feTurbulence>
      <feDisplacementMap in="f" in2="n" scale="7" xChannelSelector="R" yChannelSelector="G" result="rr"></feDisplacementMap>
      <feFlood flood-color="#ef5a44" result="c"></feFlood>
      <feComposite in="c" in2="rr" operator="in"></feComposite>
    </filter>
    <filter id="ln" x="-30%" y="-30%" width="160%" height="160%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="142" result="n"></feTurbulence>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="4.2" xChannelSelector="R" yChannelSelector="G"></feDisplacementMap>
    </filter>
  </defs>
  <g filter="url(#back)" transform="translate(6 7) rotate(-2 120 120)">
    <path d="M66 158 q-2 -52 54 -52 q56 0 54 52 Z"></path>
  </g>
  <g filter="url(#ln)" transform="rotate(-2 120 120)" fill="none" stroke="#15130e" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M66 158 q-2 -52 54 -52 q56 0 54 52 Z"></path>
      <path d="M66 158 l108 0"></path>
      <path d="M92 116 l15 14 M114 110 l15 14 M136 116 l13 12" stroke-width="3.4"></path>
      <circle cx="100" cy="100" r="1.8" fill="#15130e"></circle>
      <circle cx="138" cy="98" r="1.8" fill="#15130e"></circle>
  </g>
</svg>