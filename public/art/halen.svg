<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240" role="img" aria-label="Halen">
  <defs>
    <filter id="back" x="-45%" y="-45%" width="190%" height="190%">
      <feMorphology in="SourceAlpha" operator="dilate" radius="12" result="f"></feMorphology>
      <feTurbulence type="fractalNoise" baseFrequency="0.016" numOctaves="2" seed="174" result="n"></feTurbulence>
      <feDisplacementMap in="f" in2="n" scale="7" xChannelSelector="R" yChannelSelector="G" result="rr"></feDisplacementMap>
      <feFlood flood-color="#9d7bef" result="c"></feFlood>
      <feComposite in="c" in2="rr" operator="in"></feComposite>
    </filter>
    <filter id="ln" x="-30%" y="-30%" width="160%" height="160%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="175" result="n"></feTurbulence>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="4.2" xChannelSelector="R" yChannelSelector="G"></feDisplacementMap>
    </filter>
  </defs>
  <g filter="url(#back)" transform="translate(6 7) rotate(2 120 120)">
    <path d="M100 102 q0 -18 20 -18 q20 0 20 18 l0 74 q0 8 -8 8 l-24 0 q-8 0 -8 -8 Z"></path>
  </g>
  <g filter="url(#ln)" transform="rotate(2 120 120)" fill="none" stroke="#15130e" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M100 102 q0 -18 20 -18 q20 0 20 18 l0 74 q0 8 -8 8 l-24 0 q-8 0 -8 -8 Z"></path>
      <path d="M103 112 l34 0"></path>
      <circle cx="112" cy="96" r="2" fill="#15130e"></circle>
      <circle cx="120" cy="93" r="2" fill="#15130e"></circle>
      <circle cx="128" cy="96" r="2" fill="#15130e"></circle>
      <circle cx="106" cy="74" r="1.8" fill="#15130e"></circle>
      <circle cx="134" cy="72" r="1.8" fill="#15130e"></circle>
      <path d="M107 120 q-2 24 2 48" stroke-width="2.4"></path>
  </g>
</svg>